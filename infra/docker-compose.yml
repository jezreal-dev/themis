version: "3.9"

services:
  # ── Qdrant Vector DB ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.4
    container_name: themis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── THEMIS Backend ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: themis-backend
    ports:
      - "8080:8080"
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - VLLM_MODEL_NAME=themis-coder
      - QDRANT_URL=http://qdrant:6333
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - THEMIS_API_KEY=${THEMIS_API_KEY:-themis-dev-key}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # For sandbox tool execution
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── THEMIS Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: themis-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_WS_URL=ws://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
